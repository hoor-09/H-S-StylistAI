<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dashboard-page">
    <header>
        <nav>
            <div class="logo">H&S Fashion</div>
            <ul class="nav-links">
                <li><a href="#wardrobe">My Wardrobe</a></li>
                <li><a href="#preferences">Preferences</a></li>
                <li><a href="#outfits">Outfit Suggestions</a></li>
                <li><button id="logoutBtn" class="btn">Logout</button></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <section class="welcome-section">
            <h1>Welcome, <span id="username">User</span>!</h1>
            <p>Manage your wardrobe, set preferences, and get AI-powered outfit suggestions.</p>
        </section>
        
        <section id="wardrobe" class="dashboard-section">
            <h2>👗 Upload Your Wardrobe</h2>
            <input type="file" id="imageUpload" accept="image/*">
            <div id="closet-gallery"></div>
        </section>
        
        <section id="preferences" class="dashboard-section">
            <h2>🎨 Your Style Preferences</h2>
            <select id="styleSelect">
                <option value="casual">Casual</option>
                <option value="formal">Formal</option>
                <option value="sporty">Sporty</option>
                <option value="trendy">Trendy</option>
            </select>
        </section>
        
        <section id="outfits" class="dashboard-section">
            <h2>✨ Outfit Suggestions</h2>
            <div id="outfit-container"></div>
        </section>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
